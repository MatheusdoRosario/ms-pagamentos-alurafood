spring:
  application:
    name: pagamentos-ms

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/alurafood-pagamento?createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8081/eureka/

server:
  port: 0